# ==========================================
# SkillPath Backend - Application Properties
# ==========================================

spring.application.name=skillpath-backend
server.port=8080

# ── MySQL Database Connection ──────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/skillpath_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Security & Authentication ─────────────────
jwt.secret=${JWT_SECRET:your_super_secret_jwt_signing_key_here_must_be_long}
jwt.expiration=86400000

# ── Gemini API ──────────────────────────────
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ── JavaMail (Gmail SMTP) ───────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
